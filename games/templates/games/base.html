{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game store</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block css %} {% endblock %}
</head>
<body>
    <script
        src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous">
    </script>
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous">
    </script>

    <main>
        <div class="container text-left ">
            <div class="row" id="main-content">
                <button class="nav-item btn btn-light"><a href="{% url 'index' %}" class="nav-link">Главная</a></button>
                <button class="nav-item btn btn-light"><a href="{% url 'catalog' %}" class="nav-link">Игры</a></button>
                <button class="nav-item btn btn-light"><a href="{% url 'profile' %}" class="nav-link">
                    {% if user.is_authenticated %}
                        {{ user.username }}
                    {% else %}
                        Профиль
                    {% endif %}
                </a></button>
                {% if user.is_authenticated %}
                    <button class="nav-item btn btn-light"><a href="{% url 'logout' %}" class="nav-link">Выйти</a></button>
                {% else %}
                    <button class="nav-item btn btn-light"><a href="{% url 'login' %}" class="nav-link">Войти</a></button>
                {% endif %}
                <form method="GET" action="{% url 'search-game' %}">
                    <div class="input-group" id="search-games">
                        <input type="text" name="q" class="form-control" placeholder="Search game" aria-describedby="button-addon2">
                        <button class="nav-item btn btn-light" type="submit">Поиск</button>
                    </div>
                </form>
                <button type="button" class="btn btn-primary" id="cart"><a href="{% url 'cart' %}" class="small-btn">Корзина</a></button>
                <button type="button" class="btn btn-secondary" id="wishlist"><a href="{% url 'wishlist' %}" class="small-btn">Список желаемого</a></button>
            </div>
        </div>

        {% block content %} {% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-nav">
                <a href="{% url 'index' %}">Главная</a>
                <a href="{% url 'catalog' %}">Каталог</a>
                <a href="{% url 'cart' %}">Корзина</a>
                <a href="{% url 'profile' %}">Профиль</a>
            </div>
            <div class="social-links">
                <a href="#"><i class="fab fa-telegram"></i></a>
                <a href="#"><i class="fab fa-whatsapp"></i></a>
                <a href="#"><i class="fab fa-vk"></i></a>
            </div>
            <p class="copyright">&copy; 2024 GameStore. Все права защищены.</p>
        </div>
    </footer>
</body>
</html>
